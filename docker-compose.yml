# One-command local/self-hosted deployment.
#
#   docker compose up -d --build
#
# Then open http://localhost:9528 and create the first admin account.
#
# Services:
#   db     - MySQL metadata store (NOT exposed to the host)
#   server - Rust/axum API (internal :3001; JWT secret auto-generated on first run)
#   web    - Nginx serving the SPA + proxying /api to the server (published port)
#
# Copy .env.example to .env to override any defaults (ports, passwords, CORS).

services:
  db:
    image: mysql:8.0
    command: >-
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_report}
      MYSQL_USER: ${MYSQL_USER:-aireport}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-aireport_local_pw}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_local_pw}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_local_pw}"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  server:
    build:
      context: ./server
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-aireport}:${MYSQL_PASSWORD:-aireport_local_pw}@db:3306/${MYSQL_DATABASE:-ai_report}
      # Leave empty to have the entrypoint generate & persist a strong secret.
      JWT_SECRET: ${JWT_SECRET:-}
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-*}
    volumes:
      - server_data:/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./client
    ports:
      - "${WEB_PORT:-9528}:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  db_data:
  server_data:
